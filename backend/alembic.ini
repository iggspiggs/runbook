# Alembic configuration file.
# This file is read by `alembic` and referenced by env.py.

[alembic]
# Path to migration scripts, relative to this file's location.
script_location = alembic

# Template for new migration file names.
# %(rev)s  — the revision ID
# %(slug)s — a short description from the -m flag
# %(epoch)s — UNIX timestamp
file_template = %%(epoch)s_%%(rev)s_%%(slug)s

# Timezone for revision timestamps in migration file headers.
timezone = UTC

# Maximum length of the slug component in file names.
truncate_slug_length = 40

# Revision ordering — used when multiple heads exist.
revision_environment = false

# Set to "true" to enable sqlalchemy's logging of all SQL statements.
sqlalchemy.echo = false

# Database URL — overridden at runtime by env.py which reads from the
# app's Settings (and therefore from the .env file).  The placeholder
# here stops Alembic from complaining about a missing key; the real
# value is always injected in env.py before any connection is made.
sqlalchemy.url = postgresql+psycopg2://runbook:runbook@localhost:5432/runbook


# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
